<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SILICON TYCOON | ENTERPRISE EDITION</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="boot-screen">INITIALIZING HARDWARE...</div>
    <div id="game-container" class="hidden">
        <header>
            <div class="logo">SILICON_TYCOON <span class="blink">_</span></div>
            <div class="wallet-rack">
                <div class="crypto-stat">BALANCE: <span id="coins">0.000000</span> SC</div>
                <div class="crypto-stat">MARKET: $<span id="market-price">1.00</span></div>
            </div>
        </header>

        <main class="grid-layout">
            <!-- Left: Monitoring -->
            <section class="monitor-bay">
                <div class="panel">
                    <h3>SYSTEM_DIAGNOSTICS</h3>
                    <div class="meter-group">
                        <label>TOTAL POWER DRAW: <span id="pwr-val">0</span>W</label>
                        <div class="bar"><div id="pwr-bar" class="fill"></div></div>
                    </div>
                    <div class="meter-group">
                        <label>AVG CORE TEMP: <span id="temp-val">30</span>°C</label>
                        <div class="bar"><div id="temp-bar" class="fill"></div></div>
                    </div>
                </div>

                <div class="panel console">
                    <h3>LIVE_SYSTEM_LOG</h3>
                    <div id="log-stream"></div>
                </div>
            </section>

            <!-- Center: The Rig -->
            <section class="rig-visual">
                <div id="visual-rack">
                    <!-- GPUs will be rendered here dynamically -->
                </div>
                <button id="manual-mine" class="mine-btn">PULSE GENERATOR</button>
            </section>

            <!-- Right: Shop & Upgrades -->
            <section class="market-bay">
                <div class="panel">
                    <h3>HARDWARE_PROCUREMENT</h3>
                    <div id="gpu-shop"></div>
                </div>
                <div class="panel">
                    <h3>INFRASTRUCTURE</h3>
                    <div id="infra-shop"></div>
                </div>
            </section>
        </main>
    </div>
    <div id="glitch-overlay"></div>
    <script src="game.js"></script>
</body>
</html>
